name: V3 CI/CD Pipeline

on:
  push:
    branches: [main, develop, v3]
    paths:
      - 'v3/**'
      - '.github/workflows/v3-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'v3/**'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  test:
    name: Test V3 Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: v3/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: v3
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: v3
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3-coverage
          path: v3/__tests__/coverage/

  typecheck:
    name: Type Check V3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: v3/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: v3
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: v3
        run: pnpm typecheck
        continue-on-error: true

  build:
    name: Build V3 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: v3/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: v3
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: v3
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v3-build-${{ matrix.os }}
          path: v3/@claude-flow/*/dist/

  smoke-install-no-bsqlite:
    # Regression guard for ruvnet/ruflo#1867 — ensures @claude-flow/memory
    # installs and loads when better-sqlite3 fails to build (e.g. Node 26
    # without prebuilds). Reproduces the user-visible failure mode by
    # installing with --omit=optional.
    name: Smoke (no better-sqlite3) / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Build @claude-flow/memory
        working-directory: v3/@claude-flow/memory
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Pack tarball
        id: pack
        working-directory: v3/@claude-flow/memory
        run: |
          TARBALL=$(npm pack --silent)
          echo "tarball=$GITHUB_WORKSPACE/v3/@claude-flow/memory/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Install with --omit=optional (simulates Node 26 native build failure)
        run: |
          mkdir -p /tmp/smoke
          cd /tmp/smoke
          npm init -y >/dev/null
          npm pkg set type=module
          npm install "${{ steps.pack.outputs.tarball }}" --omit=optional --no-audit --no-fund

      - name: Assert better-sqlite3 was NOT installed
        run: |
          if [ -d /tmp/smoke/node_modules/better-sqlite3 ]; then
            echo "FAIL: better-sqlite3 installed despite --omit=optional — smoke setup is wrong"
            exit 1
          fi
          echo "ok: better-sqlite3 absent (regression scenario active)"

      - name: Run smoke script
        run: |
          cp v3/@claude-flow/memory/scripts/smoke-no-bsqlite.mjs /tmp/smoke/
          cd /tmp/smoke
          node smoke-no-bsqlite.mjs

  publish:
    name: Publish to npm (alpha)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/v3' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: v3/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: v3
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: v3
        run: pnpm build

      - name: Publish alpha
        working-directory: v3
        run: pnpm publish:alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
